<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Social Ads</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Inter;
color:white;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1557804506-669a67965ba0?q=80&w=1920");
background-size:cover;
}

.wrap{padding:20px;max-width:1100px;margin:auto}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:10px;
margin:10px 0;
}

.platforms{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

a{color:#4da6ff;text-decoration:none}

h1,h2,h3{margin:5px 0}

input,textarea{
width:100%;
padding:8px;
margin-top:5px;
border-radius:5px;
border:none;
}

button{
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
margin-top:10px;
cursor:pointer;
}

footer{
text-align:center;
margin-top:30px;
color:#aaa;
}
</style>
</head>

<body>
<div class="wrap">

<header>
<h2>Social Ads Studio</h2>
</header>

<h1>Advertisement on Social Media</h1>
<p>We create powerful ad campaigns for business growth.</p>

<div class="platforms">

<div class="card">
<h3>Facebook Ads</h3>
<a href="https://www.facebook.com/business/tools/facebook-ads/get-started">Start Campaign</a>
</div>

<div class="card">
<h3>Instagram Ads</h3>
<a href="https://sproutsocial.com/insights/instagram-advertising/">Learn More</a>
</div>

<div class="card">
<h3>YouTube Ads</h3>
<a href="https://www.youtube.com/ads/">Video Ads</a>
</div>

<div class="card">
<h3>Twitter (X) Ads</h3>
<a href="https://business.x.com/">Run Ads</a>
</div>

<div class="card">
<h3>Email Marketing</h3>
<a href="https://www.benchmarkemail.com/">Campaign Design</a>
</div>

<div class="card">
<h3>Affiliate Marketing</h3>
<a href="https://leadsguru.in/">Start Earning</a>
</div>

</div>

<h2>Contact Me</h2>

<form action="https://formspree.io/f/xwvrrnky" method="POST">
<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Message</label>
<textarea name="message" required></textarea>

<button type="submit">Send</button>
</form>

<footer>
<p>© yash</p>
</footer>

</div>
</body>
</html>
